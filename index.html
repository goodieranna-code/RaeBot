<!DOCTYPE html>
<html>
<head>
  <title>RaeBot 🌊</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a2d2ff, #cdb4db);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat {
      background: #ffffffcc;
      width: 350px;
      max-width: 90%;
      border-radius: 20px;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 6px 0;
      padding: 8px 12px;
      border-radius: 15px;
      max-width: 80%;
      word-wrap: break-word;
      position: relative;
    }

    .user { background: #d0f0ff; align-self: flex-end; }
    .bot { background: #f1f1f1; align-self: flex-start; }

    input, button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      background: #4da6ff;
      color: white;
      border: none;
      cursor: pointer;
    }

    h2 { text-align: center; margin-top: 0; color: #2b6cb0; }

    /* Typing dots */
    .typing { display: inline-block; width: 20px; }
    .dot { display: inline-block; width: 6px; height: 6px; margin: 0 2px; background-color: #555; border-radius: 50%; animation: blink 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="chat">
    <h2>RaeBot 🌊</h2>
    <div id="messages"></div>
    <input id="input" placeholder="Say something to RaeBot…" />
    <button onclick="send()">Send</button>
<button onclick="newChat()" style="margin-top:5px; background:#76c7ff;">New Chat 🌊</button>

  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");
    let userId = null;

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      // Show user bubble
      const userBubble = document.createElement("div");
      userBubble.className = "msg user";
      userBubble.textContent = text;
      messages.appendChild(userBubble);

      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      // Typing animation
      const typingBubble = document.createElement("div");
      typingBubble.className = "msg bot";
      typingBubble.id = "typing";
      typingBubble.innerHTML = `RaeBot: <span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
      messages.appendChild(typingBubble);
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, userId })
        });

        const data = await res.json();
        userId = data.userId; // save userId for session

        messages.removeChild(typingBubble);

        // Bot bubble with emojis
        const botBubble = document.createElement("div");
        botBubble.className = "msg bot";
        const reply = data.reply
          .replace(/happy/gi, "😊")
          .replace(/yes/gi, "👍🌊")
          .replace(/no/gi, "😢")
          .replace(/cool/gi, "😎🌴");
        botBubble.textContent = "RaeBot: " + reply;
        messages.appendChild(botBubble);
        messages.scrollTop = messages.scrollHeight;

      } catch (err) {
        messages.removeChild(typingBubble);
        const errorBubble = document.createElement("div");
        errorBubble.className = "msg bot";
        errorBubble.textContent = "RaeBot: ⚠️ Something went wrong!";
        messages.appendChild(errorBubble);
        messages.scrollTop = messages.scrollHeight;
      }
    }

    input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
  </script>
</body>
</html>
